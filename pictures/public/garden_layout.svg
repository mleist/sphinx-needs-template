<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360">
  <title>Garden layout</title>
  <desc>Schematic top-down view of the demo garden: house, patio, back yard lawn, vegetable bed, flower bed, front yard.</desc>

  <defs>
    <pattern id="grass" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="6" fill="#bfe1a3"/>
      <path d="M0,6 L3,0 M3,6 L6,0" stroke="#7fbf6a" stroke-width="0.6"/>
    </pattern>
    <pattern id="paving" patternUnits="userSpaceOnUse" width="20" height="20">
      <rect width="20" height="20" fill="#d8d4c8"/>
      <path d="M0,0 H20 M0,10 H20 M0,20 H20 M0,0 V20 M10,0 V20 M20,0 V20"
            stroke="#a59c89" stroke-width="0.6"/>
    </pattern>
  </defs>

  <!-- frame -->
  <rect x="10" y="10" width="580" height="340" fill="#f6f4ee" stroke="#7a6e54" stroke-width="2"/>

  <!-- street label -->
  <text x="300" y="30" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#555">street</text>

  <!-- front yard (lawn + flower bed) -->
  <rect x="40" y="50" width="520" height="70" fill="url(#grass)" stroke="#5a8a4d" stroke-width="1"/>
  <text x="300" y="92" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1f3a17">front yard (US_FRONT_LAWN_TRIM)</text>

  <rect x="60" y="65" width="100" height="35" fill="#f0a7c5" stroke="#a4577e" stroke-width="1"/>
  <text x="110" y="87" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4a1a31">flower bed (US_PLANT_FLOWERS)</text>

  <!-- house -->
  <rect x="180" y="135" width="240" height="65" fill="#cdb094" stroke="#6e553a" stroke-width="2"/>
  <text x="300" y="172" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#3b2614">house</text>

  <!-- patio -->
  <rect x="220" y="200" width="160" height="40" fill="url(#paving)" stroke="#8c8273" stroke-width="1"/>
  <text x="300" y="223" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">patio (US_HOST_PARTY)</text>

  <!-- back yard lawn -->
  <rect x="40" y="240" width="520" height="80" fill="url(#grass)" stroke="#5a8a4d" stroke-width="1"/>
  <text x="160" y="285" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1f3a17">back yard (US_MOW_LAWN)</text>

  <!-- vegetable bed -->
  <rect x="430" y="255" width="110" height="50" fill="#dab47a" stroke="#7a5a26" stroke-width="1"/>
  <text x="485" y="277" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3b260d">vegetable bed</text>
  <text x="485" y="292" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3b260d">(US_PLANT_VEGGIES)</text>

  <!-- caption -->
  <text x="300" y="345" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#777">
    Schematic — not to scale. Each region links to one user story.
  </text>
</svg>
